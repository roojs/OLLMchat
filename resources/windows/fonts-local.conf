<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <description>OLLMchat Windows portable font paths</description>

  <!-- Bundled fonts (relative to etc/fonts/). -->
  <dir>../share/fonts</dir>

  <!-- GTK/Adwaita defaults to Cantarell; not bundled in the portable tree. -->
  <alias binding="strong">
    <family>Cantarell</family>
    <prefer>
      <family>Segoe UI</family>
      <family>Noto Sans</family>
    </prefer>
  </alias>

  <!-- Color emoji fonts have no bold/italic faces (Pango otherwise requests "emoji Bold"). -->
  <match target="pattern">
    <test qual="any" name="family">
      <string>emoji</string>
    </test>
    <edit name="weight" mode="assign">
      <const>regular</const>
    </edit>
  </match>
  <match target="pattern">
    <test qual="any" name="family">
      <string>Noto Color Emoji</string>
    </test>
    <edit name="weight" mode="assign">
      <const>regular</const>
    </edit>
  </match>
  <match target="pattern">
    <test qual="any" name="family">
      <string>Segoe UI Emoji</string>
    </test>
    <edit name="weight" mode="assign">
      <const>regular</const>
    </edit>
  </match>
</fontconfig>
