# Native Windows build (MSYS2 UCRT64) — Phase 1 of docs/plans/5.6-windows-native-github-build.md
#
# Manual only (workflow_dispatch). Not wired to tags yet — iterate with:
#   gh workflow run windows-build.yml --ref <branch>
#
name: Windows build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    name: Build on Windows (MSYS2 UCRT64)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
      # Avoid CRLF checkouts breaking Vala→C string line-continuations on MinGW.
      - name: Git LF only
        shell: bash
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - uses: actions/checkout@v5

      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          path-type: strict
          update: true
          install: >-
            base-devel
            git
            unzip
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-vala
            mingw-w64-ucrt-x86_64-meson
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-pkg-config
            mingw-w64-ucrt-x86_64-gtk4
            mingw-w64-ucrt-x86_64-libadwaita
            mingw-w64-ucrt-x86_64-gtksourceview5
            mingw-w64-ucrt-x86_64-libgee
            mingw-w64-ucrt-x86_64-libsoup3
            mingw-w64-ucrt-x86_64-json-glib
            mingw-w64-ucrt-x86_64-libxml2
            mingw-w64-ucrt-x86_64-sqlite3
            mingw-w64-ucrt-x86_64-libgit2-glib
            mingw-w64-ucrt-x86_64-gobject-introspection
            mingw-w64-ucrt-x86_64-libtree-sitter
            mingw-w64-ucrt-x86_64-openblas
            mingw-w64-ucrt-x86_64-lapack
            mingw-w64-ucrt-x86_64-curl
            mingw-w64-ucrt-x86_64-cantarell-fonts
            mingw-w64-ucrt-x86_64-cmake

      - name: Build webview2-gtk + OLLMchat
        run: |
          chmod +x scripts/ci/windows-msys2-build.sh
          ./scripts/ci/windows-msys2-build.sh
