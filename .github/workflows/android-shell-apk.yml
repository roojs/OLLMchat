name: Android shell APK

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            curl \
            git \
            gir1.2-appstream \
            glslc \
            gobject-introspection \
            libadwaita-1-dev \
            libglib-object-introspection-perl \
            libglib-perl \
            libglib2.0-dev-bin \
            libgtk-4-dev \
            libipc-run-perl \
            libjson-perl \
            libset-scalar-perl \
            libxml-libxml-perl \
            libxml-libxslt-perl \
            libxml2-utils \
            meson \
            ninja-build \
            openjdk-17-jdk \
            pkg-config \
            sassc \
            unzip \
            valac

      - name: Build shell APK
        run: scripts/android/build-shell-poc-apk.sh

      - name: Collect APK artifact
        run: |
          mkdir -p android-artifacts
          cp .pixiewood/android/app/build/outputs/apk/debug/app-arm64-v8a-debug.apk \
            android-artifacts/ollmchat-android-shell-poc-debug.apk
          ls -lh android-artifacts

      - name: Verify APK contains application library
        run: |
          unzip -l android-artifacts/ollmchat-android-shell-poc-debug.apk | \
            grep -q 'lib/arm64-v8a/libollmchat-android-shell-poc.so'

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          path: android-artifacts/ollmchat-android-shell-poc-debug.apk
          archive: false
          if-no-files-found: error
