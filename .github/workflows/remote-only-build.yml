name: Remote-only build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            curl \
            gobject-introspection \
            libadwaita-1-dev \
            libblas-dev \
            libcairo2-dev \
            libffi-dev \
            libgee-0.8-dev \
            libgirepository1.0-dev \
            libgit2-glib-1.0-dev \
            libglib2.0-dev \
            libgtk-4-dev \
            libgtksourceview-5-dev \
            libjson-glib-dev \
            liblapack-dev \
            libomp-dev \
            libopenblas-dev \
            libseccomp-dev \
            libsoup-3.0-dev \
            libsqlite3-dev \
            libtree-sitter-dev \
            libxml2-dev \
            meson \
            ninja-build \
            pkg-config \
            valac

      # Ubuntu 24.04 does not ship libfaiss-dev. Match the existing release and
      # documentation workflows by installing the current Debian amd64 package.
      - name: Install libfaiss-dev from Debian
        run: |
          set -euo pipefail
          POOL="https://deb.debian.org/debian/pool/main/f/faiss"
          deb=$(curl -fsSL "$POOL/" \
            | grep -oE 'href="libfaiss-dev_[^"]+_amd64\.deb"' \
            | sed 's/^href="//;s/"$//' \
            | sort -V \
            | tail -n1)
          if [ -z "${deb}" ]; then
            echo "Could not find libfaiss-dev_*_amd64.deb under ${POOL}" >&2
            exit 1
          fi
          echo "Using Debian package: ${deb}"
          curl -fsSL "$POOL/${deb}" -o /tmp/libfaiss-dev.deb
          sudo apt-get install -y libfaiss1 || true
          sudo dpkg -i /tmp/libfaiss-dev.deb || sudo apt-get install -f -y

      - name: Configure remote-only build
        run: |
          meson setup build \
            --prefix=/usr \
            -Ddocs=false \
            -Dexamples=true \
            -Dtests=true \
            -Dandroid_poc=true \
            -Dlocal_gguf=disabled

      - name: Build
        run: ninja -C build

      - name: Build Android shell POC target
        run: |
          meson setup build-android-shell \
            --prefix=/usr \
            -Ddocs=false \
            -Dexamples=false \
            -Dtests=false \
            -Dandroid_shell_poc=true \
            -Dlocal_gguf=disabled
          ninja -C build-android-shell

      - name: Run offline tests
        run: |
          meson test -C build --no-rebuild --print-errorlogs \
            test-ollamaweb-parse \
            test-ollamaweb-merge \
            test-markdown-parser \
            check-back-token-test
