name: Deploy Documentation to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      # Only trigger on changes to source files that affect documentation
      - 'libocsqlite/**/*.vala'
      - 'libocfiles/**/*.vala'
      - 'libocmarkdown/**/*.vala'
      - 'libocmarkdowngtk/**/*.vala'
      - 'libollmchat/**/*.vala'
      - 'liboctools/**/*.vala'
      - 'liboccoder/**/*.vala'
      - 'libocvector/**/*.vala'
      - 'libollmchatgtk/**/*.vala'
      - 'ollmapp/**/*.vala'
      - 'examples/**/*.vala'
      - 'docs/meson.build'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:  # Allow manual triggering

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install libfaiss-dev dependencies from Ubuntu
        run: |
          # Update package lists and install dependencies from Ubuntu repositories
          sudo apt-get update
          sudo apt-get install -y \
            libblas-dev \
            liblapack-dev \
            libomp-dev
          
      - name: Download and install libfaiss-dev
        run: |
          set -euo pipefail
          # Ubuntu does not ship a suitable libfaiss-dev for this image; install the
          # current Debian amd64 package. The pool filename changes when Debian
          # bumps faiss — discover the latest libfaiss-dev_*_amd64.deb instead of a
          # hardcoded URL.
          POOL="https://deb.debian.org/debian/pool/main/f/faiss"
          deb=$(curl -fsSL "$POOL/" \
            | grep -oE 'href="libfaiss-dev_[^"]+_amd64\.deb"' \
            | sed 's/^href="//;s/"$//' \
            | sort -V \
            | tail -n1)
          if [ -z "${deb}" ]; then
            echo "Could not find libfaiss-dev_*_amd64.deb under ${POOL}" >&2
            exit 1
          fi
          echo "Using Debian package: ${deb}"
          curl -fsSL "$POOL/${deb}" -o /tmp/libfaiss-dev.deb
          sudo apt-get install -y libfaiss1 || true
          sudo dpkg -i /tmp/libfaiss-dev.deb || sudo apt-get install -f -y

      - name: Install build dependencies
        run: |
          # Enable universe for GTK/Vala/doc tooling (faiss comes from Debian above)
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository universe -y
          sudo apt-get update
          sudo apt-get install -y \
            meson \
            ninja-build \
            valac \
            valadoc \
            libgee-0.8-dev \
            libglib2.0-dev \
            libgtk-4-dev \
            libgtksourceview-5-dev \
            libadwaita-1-dev \
            libsoup-3.0-dev \
            libjson-glib-dev \
            libxml2-dev \
            libsqlite3-dev \
            libgit2-glib-1.0-dev \
            gobject-introspection \
            libgirepository1.0-dev \
            libomp-dev \
            libblas-dev \
            liblapack-dev \
            libseccomp-dev \
            libtree-sitter-dev \
            desktop-file-utils \
            build-essential \
            pkg-config

      - name: Setup meson build
        run: |
          # Setup meson build (only configures, doesn't build anything yet)
          meson setup build --prefix=/usr

      - name: Build documentation
        run: |
          # Build only the valadoc documentation target (no libraries or GIR files needed)
          ninja -C build docs/valadoc

      - name: Create .nojekyll file
        run: |
          touch build/valadoc/.nojekyll

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: build/valadoc

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

