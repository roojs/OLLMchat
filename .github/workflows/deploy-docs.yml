name: Deploy Documentation to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      # Only trigger on changes to source files that affect documentation
      - 'libocsqlite/**/*.vala'
      - 'libocfiles/**/*.vala'
      - 'libocmarkdown/**/*.vala'
      - 'libocmarkdowngtk/**/*.vala'
      - 'libollmchat/**/*.vala'
      - 'liboctools/**/*.vala'
      - 'liboccoder/**/*.vala'
      - 'libocvector/**/*.vala'
      - 'libollmchatgtk/**/*.vala'
      - 'ollmapp/**/*.vala'
      - 'examples/**/*.vala'
      - 'docs/meson.build'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:
    inputs:
      refresh_cache:
        description: Rebuild Debian extra-package download cache from scratch
        type: boolean
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

env:
  DEB_CACHE_DIR: .ci-cache/debian-debs-amd64

jobs:
  build:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Restore Debian extra package download cache
        id: restore-deb-cache
        uses: actions/cache/restore@v6
        with:
          path: ${{ env.DEB_CACHE_DIR }}
          key: debian-extra-debs-v1-${{ inputs.refresh_cache && github.run_id || 'stable' }}-${{ hashFiles('scripts/ci/debian-pool-deb.sh', 'scripts/ci/install-libfaiss-dev-debian.sh') }}
          restore-keys: |
            debian-extra-debs-v1-stable-
            debian-extra-debs-v1-

      - name: Install libfaiss-dev from Debian
        id: install-faiss
        env:
          DEB_CACHE_DIR: ${{ github.workspace }}/${{ env.DEB_CACHE_DIR }}
        run: ./scripts/ci/install-libfaiss-dev-debian.sh

      - name: Detect Debian extra package cache
        if: always()
        id: deb-cache
        run: |
          if [ -d "$DEB_CACHE_DIR" ] && find "$DEB_CACHE_DIR" -type f -name '*.deb' -print -quit | grep -q .; then
            echo "save=true" >> "$GITHUB_OUTPUT"
          else
            echo "save=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          DEB_CACHE_DIR: ${{ env.DEB_CACHE_DIR }}

      - name: Save Debian extra package download cache
        if: always() && steps.deb-cache.outputs.save == 'true' && steps.restore-deb-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: ${{ env.DEB_CACHE_DIR }}
          key: debian-extra-debs-v1-stable-${{ hashFiles('scripts/ci/debian-pool-deb.sh', 'scripts/ci/install-libfaiss-dev-debian.sh') }}

      - name: Install build dependencies
        run: |
          # Enable universe for GTK/Vala/doc tooling (faiss comes from Debian above)
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository universe -y
          sudo apt-get update
          sudo apt-get install -y \
            meson \
            ninja-build \
            valac \
            valadoc \
            libgee-0.8-dev \
            libglib2.0-dev \
            libgtk-4-dev \
            libgtksourceview-5-dev \
            libadwaita-1-dev \
            libsoup-3.0-dev \
            libjson-glib-dev \
            libxml2-dev \
            libsqlite3-dev \
            libgit2-glib-1.0-dev \
            gobject-introspection \
            libgirepository1.0-dev \
            libomp-dev \
            libblas-dev \
            liblapack-dev \
            libseccomp-dev \
            libtree-sitter-dev \
            desktop-file-utils \
            build-essential \
            pkg-config

      - name: Setup meson build
        run: |
          # Setup meson build (only configures, doesn't build anything yet)
          meson setup build --prefix=/usr

      - name: Build documentation
        run: |
          # Build only the valadoc documentation target (no libraries or GIR files needed)
          ninja -C build docs/valadoc

      - name: Create .nojekyll file
        run: |
          touch build/valadoc/.nojekyll

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: build/valadoc

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
