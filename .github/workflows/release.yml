name: Release build

# Builds Debian packages (amd64) first for fast feedback, then Linux AppImages
# (x86_64 + aarch64) and the Windows installer with sqgipkg, and publishes
# release assets for tags like `v1.0.0`.

run-name: Release build · ${{ github.ref_name }}

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      refresh_cache:
        description: Rebuild sqgipkg, Meson, and Debian extra-package caches from scratch
        type: boolean
        default: false

permissions:
  contents: write

env:
  APPIMAGE_EXTRACT_AND_RUN: '1'

jobs:
  build:
    name: Build and publish
    runs-on: ubuntu-24.04
    env:
      DEB_CACHE_DIR: OLLMchat/.ci-cache/debian-debs-amd64
    steps:
      - name: Checkout OLLMchat
        uses: actions/checkout@v4
        with:
          path: OLLMchat

      - name: Restore sqgipkg dependency cache
        uses: actions/cache@v4
        with:
          path: OLLMchat/.sqgipkg
          key: sqgipkg-deps-v1-${{ inputs.refresh_cache && github.run_id || 'stable' }}-${{ hashFiles('OLLMchat/sqgipkg.json', 'OLLMchat/scripts/release/sqgi.revision') }}
          restore-keys: |
            sqgipkg-deps-v1-stable-

      - name: Restore sqgipkg Meson build cache
        uses: actions/cache@v4
        with:
          path: |
            OLLMchat/build-linux-x86_64
            OLLMchat/build-linux-aarch64
            OLLMchat/build-windows-x86_64
          key: sqgipkg-meson-v1-${{ inputs.refresh_cache && github.run_id || 'stable' }}-${{ hashFiles('OLLMchat/**/*.vala', 'OLLMchat/**/meson.build', 'OLLMchat/meson.build', 'OLLMchat/meson_options.txt', 'OLLMchat/sqgipkg.json') }}
          restore-keys: |
            sqgipkg-meson-v1-stable-

      - name: Restore Debian extra package download cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.DEB_CACHE_DIR }}
          key: debian-extra-debs-v1-${{ inputs.refresh_cache && github.run_id || 'stable' }}
          restore-keys: |
            debian-extra-debs-v1-stable-
            debian-extra-debs-v1-

      - name: Install Debian build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkg-config git file ca-certificates wget curl \
            meson valac gobject-introspection devscripts debhelper \
            libglib2.0-dev libgirepository1.0-dev libffi-dev libcairo2-dev \
            libgee-0.8-dev libjson-glib-dev libsoup-3.0-dev libxml2-dev \
            libsqlite3-dev libgtk-4-dev libgtksourceview-5-dev libadwaita-1-dev \
            libtree-sitter-dev libseccomp-dev libgit2-glib-1.0-dev \
            libopenblas-dev liblapack-dev

      # Ubuntu 24.04 does not ship libfaiss-dev; install the current Debian amd64
      # package (same approach as deploy-docs.yml) before the native deb build.
      - name: Install libfaiss-dev from Debian
        working-directory: OLLMchat
        env:
          DEB_CACHE_DIR: ${{ github.workspace }}/${{ env.DEB_CACHE_DIR }}
        run: ./scripts/ci/install-libfaiss-dev-debian.sh

      - name: Install libllama from Debian
        working-directory: OLLMchat
        env:
          DEB_CACHE_DIR: ${{ github.workspace }}/${{ env.DEB_CACHE_DIR }}
        run: ./scripts/fetch-libllama.sh

      - name: Build Debian packages (amd64)
        working-directory: OLLMchat
        env:
          DEBFULLNAME: GitHub Actions
          DEBEMAIL: actions@users.noreply.github.com
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG_VER="${GITHUB_REF_NAME#v}"
            DEB_VER="$(echo "$TAG_VER" | sed 's/-/~/')"
            dch -v "${DEB_VER}-1" -D unstable "Release ${GITHUB_REF_NAME}" --force-distribution
          fi
          ./debian/use-monolithic-package.sh
          dpkg-buildpackage -us -uc -b
          rm -rf build
          ./debian/use-monolithic-remote-only-package.sh
          dpkg-buildpackage -us -uc -b
          ./debian/use-monolithic-package.sh

      - name: Read sqgi revision
        id: sqgi
        working-directory: OLLMchat
        run: |
          rev="$(grep -v '^[[:space:]]*#' scripts/release/sqgi.revision | grep -v '^[[:space:]]*$' | head -n1 | tr -d '[:space:]')"
          if [ -z "$rev" ]; then
            echo "Missing sqgi revision in scripts/release/sqgi.revision" >&2
            exit 1
          fi
          echo "rev=$rev" >> "$GITHUB_OUTPUT"

      - name: Checkout sqgi (runtime + sqgipkg)
        uses: actions/checkout@v4
        with:
          repository: supercamel/sqgi
          path: sqgi
          ref: ${{ steps.sqgi.outputs.rev }}

      - name: Restore sqgi build cache
        uses: actions/cache@v4
        with:
          path: sqgi/build
          key: sqgi-build-v1-${{ hashFiles('OLLMchat/scripts/release/sqgi.revision') }}
          restore-keys: |
            sqgi-build-v1-

      - name: Install AppImage and Windows build dependencies
        run: |
          sudo apt-get install -y --no-install-recommends \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu qemu-user-static binfmt-support \
            mingw-w64 nsis squashfs-tools

      - name: Build and install sqgi
        run: |
          cmake -S sqgi -B sqgi/build -G Ninja -DCMAKE_BUILD_TYPE=Release -DSQ_ENABLE_JIT=ON
          cmake --build sqgi/build
          sudo cmake --install sqgi/build --prefix /usr/local
          sudo ldconfig

      - name: Build Linux x86_64 AppImage
        working-directory: OLLMchat
        run: sqgipkg --target appimage --appimage-arch x86_64 --sqgi-source-dir "$GITHUB_WORKSPACE/sqgi"

      - name: Build Linux aarch64 AppImage
        working-directory: OLLMchat
        run: sqgipkg --target appimage --appimage-arch aarch64 --sqgi-source-dir "$GITHUB_WORKSPACE/sqgi"

      - name: Download Noto Color Emoji font (Windows bundle)
        working-directory: OLLMchat
        run: |
          set -euo pipefail
          mkdir -p resources/fonts
          font=resources/fonts/NotoColorEmoji.ttf
          if [[ ! -s "$font" ]]; then
            curl -fsSL -o "$font" \
              https://github.com/googlefonts/noto-emoji/raw/main/fonts/NotoColorEmoji.ttf
          fi
          test -s "$font"

      - name: Build Windows installer
        working-directory: OLLMchat
        run: sqgipkg --target win-nsis --sqgi-source-dir "$GITHUB_WORKSPACE/sqgi"

      - name: Collect artifacts
        working-directory: OLLMchat
        run: |
          mkdir -p artifacts
          cp dist-linux-x86_64/OLLMchat.AppImage artifacts/OLLMchat-remote-only-x86_64.AppImage
          cp dist-linux-aarch64/OLLMchat.AppImage artifacts/OLLMchat-remote-only-aarch64.AppImage
          cp dist-windows-x86_64/OLLMchat-Setup.exe artifacts/OLLMchat-remote-only-Setup.exe
          cp ../ollmchat_[0-9]*.deb artifacts/
          cp ../ollmchat-remote-only_[0-9]*.deb artifacts/
          ls -lh artifacts

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ollmchat-builds
          path: OLLMchat/artifacts/*

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: OLLMchat
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" artifacts/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
          || gh release upload "$GITHUB_REF_NAME" artifacts/* \
            --repo "$GITHUB_REPOSITORY" --clobber

      - name: Save Debian extra package download cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ${{ env.DEB_CACHE_DIR }}
          key: debian-extra-debs-v1-${{ hashFiles('OLLMchat/.ci-cache/debian-debs-amd64/**') }}
