name: Android build

on:
  workflow_dispatch:
    inputs:
      refresh_cache:
        description: Rebuild SDK and Pixiewood/GTK caches from scratch
        type: boolean
        default: false

run-name: Android build

permissions:
  contents: read

env:
  APT_CACHE_DIR: .ci-cache/apt
  GRADLE_USER_HOME: /home/runner/.gradle
  PIXIEWOOD_CACHE_PATHS: |
    .android-tools
    .pixiewood/bin-aarch64
    .pixiewood/pixiewood.ini
    .pixiewood/toolchain.cross
    subprojects

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Restore Android SDK and NDK cache
        uses: actions/cache/restore@v4
        with:
          path: .android-sdk
          key: android-sdk-v1-${{ inputs.refresh_cache && github.run_id || 'stable' }}-${{ hashFiles('scripts/android/install-sdk.sh') }}
          restore-keys: |
            android-sdk-v1-stable-
            android-sdk-v1-

      - name: Restore Pixiewood and GTK dependency cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.PIXIEWOOD_CACHE_PATHS }}
          key: pixiewood-chat-v1-${{ inputs.refresh_cache && github.run_id || 'stable' }}-${{ hashFiles('android/pixiewood-chat-poc.xml', 'android/icon-foreground.xml', 'android/pixiewood-extra.cross', 'android/pixiewood-wraps/**', 'scripts/android/gtk-android-builder.revision', 'scripts/android/install-sdk.sh', 'meson.build', 'meson_options.txt', 'libollmchat/meson.build', 'libocsqlite/meson.build', 'libocmarkdown/meson.build', 'libollamaweb/meson.build', 'ollmapp/meson.build', 'ollmapp/AndroidPoc.vala') }}
          restore-keys: |
            pixiewood-chat-v1-stable-

      - name: Restore Gradle cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ${{ env.GRADLE_USER_HOME }}/caches
            ${{ env.GRADLE_USER_HOME }}/wrapper
          key: gradle-android-v1-${{ inputs.refresh_cache && github.run_id || 'stable' }}
          restore-keys: |
            gradle-android-v1-stable-
            gradle-android-v1-

      - name: Restore apt package cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.APT_CACHE_DIR }}
          key: apt-android-v1-${{ inputs.refresh_cache && github.run_id || 'stable' }}-${{ hashFiles('.github/workflows/android-build.yml') }}
          restore-keys: |
            apt-android-v1-stable-
            apt-android-v1-

      - name: Install build dependencies
        id: install-deps
        run: |
          mkdir -p "$APT_CACHE_DIR"
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            -o Dir::Cache::archives="$PWD/$APT_CACHE_DIR" \
            build-essential \
            ca-certificates \
            curl \
            git \
            gir1.2-appstream \
            glslc \
            libadwaita-1-dev \
            libglib-object-introspection-perl \
            libglib-perl \
            libglib2.0-dev-bin \
            libgtk-4-dev \
            libipc-run-perl \
            libjson-perl \
            libset-scalar-perl \
            libxml-libxml-perl \
            libxml-libxslt-perl \
            libxml2-utils \
            meson \
            ninja-build \
            openjdk-17-jdk \
            pkg-config \
            python3 \
            sassc \
            unzip \
            valac

      - name: Save apt package cache
        if: always() && steps.install-deps.outcome == 'success'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.APT_CACHE_DIR }}
          key: apt-android-v1-stable-${{ hashFiles('.github/workflows/android-build.yml') }}

      - name: Prepare and verify Android cross configure
        id: verify-configure
        run: scripts/android/verify-cross-configure.sh

      - name: Detect post-configure cache targets
        if: always()
        id: post-configure-cache
        run: |
          save_android_sdk=false
          save_pixiewood=false

          if [ -x .android-sdk/cmdline-tools/latest/bin/sdkmanager ]; then
            save_android_sdk=true
          fi
          if [ -f .pixiewood/pixiewood.ini ] && [ -f .pixiewood/toolchain.cross ]; then
            save_pixiewood=true
          fi

          echo "android-sdk=$save_android_sdk" >> "$GITHUB_OUTPUT"
          echo "pixiewood=$save_pixiewood" >> "$GITHUB_OUTPUT"

      - name: Save Android SDK and NDK cache
        if: always() && steps.post-configure-cache.outputs.android-sdk == 'true'
        uses: actions/cache/save@v4
        with:
          path: .android-sdk
          key: android-sdk-v1-stable-${{ hashFiles('scripts/android/install-sdk.sh') }}

      - name: Save Pixiewood and GTK dependency cache (after configure)
        if: always() && steps.post-configure-cache.outputs.pixiewood == 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.PIXIEWOOD_CACHE_PATHS }}
          key: pixiewood-chat-v1-stable-${{ hashFiles('android/pixiewood-chat-poc.xml', 'android/icon-foreground.xml', 'android/pixiewood-extra.cross', 'android/pixiewood-wraps/**', 'scripts/android/gtk-android-builder.revision', 'scripts/android/install-sdk.sh', 'meson.build', 'meson_options.txt', 'libollmchat/meson.build', 'libocsqlite/meson.build', 'libocmarkdown/meson.build', 'libollamaweb/meson.build', 'ollmapp/meson.build', 'ollmapp/AndroidPoc.vala') }}

      - name: Build chat APK
        id: build-apk
        run: PIXIEWOOD_PHASE=build scripts/android/build-chat-poc-apk.sh

      - name: Detect post-build cache targets
        if: always()
        id: post-build-cache
        run: |
          save_gradle=false
          save_pixiewood=false

          if [ -d "$GRADLE_USER_HOME/caches" ] && find "$GRADLE_USER_HOME/caches" -type f -print -quit | grep -q .; then
            save_gradle=true
          fi
          if [ -f .pixiewood/pixiewood.ini ] && [ -f .pixiewood/toolchain.cross ]; then
            save_pixiewood=true
          fi

          echo "gradle=$save_gradle" >> "$GITHUB_OUTPUT"
          echo "pixiewood=$save_pixiewood" >> "$GITHUB_OUTPUT"

      - name: Save Gradle cache
        if: always() && steps.post-build-cache.outputs.gradle == 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            ${{ env.GRADLE_USER_HOME }}/caches
            ${{ env.GRADLE_USER_HOME }}/wrapper
          key: gradle-android-v1-stable-${{ hashFiles('scripts/android/gtk-android-builder.revision') }}

      - name: Save Pixiewood and GTK dependency cache (after build)
        if: always() && steps.post-build-cache.outputs.pixiewood == 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.PIXIEWOOD_CACHE_PATHS }}
          key: pixiewood-chat-v1-stable-${{ hashFiles('android/pixiewood-chat-poc.xml', 'android/icon-foreground.xml', 'android/pixiewood-extra.cross', 'android/pixiewood-wraps/**', 'scripts/android/gtk-android-builder.revision', 'scripts/android/install-sdk.sh', 'meson.build', 'meson_options.txt', 'libollmchat/meson.build', 'libocsqlite/meson.build', 'libocmarkdown/meson.build', 'libollamaweb/meson.build', 'ollmapp/meson.build', 'ollmapp/AndroidPoc.vala') }}

      - name: Collect APK artifact
        run: |
          mkdir -p android-artifacts
          cp .pixiewood/android/app/build/outputs/apk/debug/app-arm64-v8a-debug.apk \
            android-artifacts/ollmchat-android-poc-debug.apk
          ls -lh android-artifacts

      - name: Verify APK contains application and chat libraries
        run: |
          unzip -l android-artifacts/ollmchat-android-poc-debug.apk | \
            grep -q 'lib/arm64-v8a/libollmchat-android-poc.so'
          unzip -l android-artifacts/ollmchat-android-poc-debug.apk | \
            grep -q 'lib/arm64-v8a/libollmchat.so'

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          path: android-artifacts/ollmchat-android-poc-debug.apk
          archive: false
          if-no-files-found: error
