name: Android build

# Manual APK builds. Tag pushes are built from release.yml via the reusable workflow.

on:
  workflow_dispatch:
    inputs:
      refresh_cache:
        description: Rebuild SDK and Pixiewood/GTK caches from scratch
        type: boolean
        default: false

run-name: Android build

permissions:
  contents: read

jobs:
  build-apk:
    uses: ./.github/workflows/android-build-reusable.yml
    with:
      refresh_cache: ${{ inputs.refresh_cache }}
      upload_to_release: false
