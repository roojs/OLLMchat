name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CXX: g++
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install libfaiss-dev dependencies from Ubuntu
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libblas-dev \
            liblapack-dev \
            libomp-dev

      - name: Download and install libfaiss-dev
        run: |
          set -euo pipefail
          POOL="https://deb.debian.org/debian/pool/main/f/faiss"
          deb=$(curl -fsSL "$POOL/" \
            | grep -oE 'href="libfaiss-dev_[^"]+_amd64\.deb"' \
            | sed 's/^href="//;s/"$//' \
            | sort -V \
            | tail -n1)
          if [ -z "${deb}" ]; then
            echo "Could not find libfaiss-dev_*_amd64.deb under ${POOL}" >&2
            exit 1
          fi
          echo "Using Debian package: ${deb}"
          curl -fsSL "$POOL/${deb}" -o /tmp/libfaiss-dev.deb
          sudo apt-get install -y libfaiss1 || true
          sudo dpkg -i /tmp/libfaiss-dev.deb || sudo apt-get install -f -y

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository universe -y
          sudo apt-get update
          sudo apt-get install -y \
            meson \
            ninja-build \
            valac \
            valadoc \
            libgee-0.8-dev \
            libglib2.0-dev \
            libgtk-4-dev \
            libgtksourceview-5-dev \
            libadwaita-1-dev \
            libsoup-3.0-dev \
            libjson-glib-dev \
            libxml2-dev \
            libsqlite3-dev \
            libgit2-glib-1.0-dev \
            gobject-introspection \
            libgirepository1.0-dev \
            libomp-dev \
            libblas-dev \
            liblapack-dev \
            libseccomp-dev \
            libtree-sitter-dev \
            desktop-file-utils \
            build-essential \
            pkg-config

      - name: Setup Meson build
        run: meson setup build --prefix=/usr

      - name: Build
        run: ninja -C build
